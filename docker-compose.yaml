services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-vorionmart_db}
      MYSQL_USER: ${DB_USER:-admin_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-securepassword}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DEBUG: ${DEBUG:-False}
      DB_ENGINE: django.db.backends.mysql
      DB_NAME: ${DB_NAME:-vorionmart_db}
      DB_USER: ${DB_USER:-admin_user}
      DB_PASSWORD: ${DB_PASSWORD:-securepassword}
      DB_HOST: db
      DB_PORT: 3306
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-vorionmart.com,www.vorionmart.com,localhost,127.0.0.1}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-https://vorionmart.com}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
      TWILIO_WHATSAPP_ORDER_CONFIRMATION_CONTENT_SID: ${TWILIO_WHATSAPP_ORDER_CONFIRMATION_CONTENT_SID:-}
      TWILIO_WHATSAPP_ORDER_ALERT_CONTENT_SID: ${TWILIO_WHATSAPP_ORDER_ALERT_CONTENT_SID:-}
      TWILIO_WHATSAPP_STATUS_CALLBACK_URL: ${TWILIO_WHATSAPP_STATUS_CALLBACK_URL:-}
      TWILIO_VALIDATE_WEBHOOK_SIGNATURE: ${TWILIO_VALIDATE_WEBHOOK_SIGNATURE:-False}
      GOOGLE_MERCHANT_ID: ${GOOGLE_MERCHANT_ID:-}
      GOOGLE_SERVICE_ACCOUNT_FILE: ${GOOGLE_SERVICE_ACCOUNT_FILE:-firebase-service-account.json}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - backend_media:/app/media
      - backend_logs:/app/logs
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-}
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID:-}
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - backend_media:/app/media:ro

volumes:
  mysql_data:
  backend_media:
  backend_logs:
